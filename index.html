<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AstroLink</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f8f9fa; }
  </style>
</head>
<body>
 
<!-- LOGIN -->
<div id="paginaLogin" class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card p-4 shadow-sm">
        <h4 class="text-center mb-4">🛸 AstroLink</h4>
 
        <div id="erroLogin" class="alert alert-danger d-none">Usuário ou senha incorretos.</div>
 
        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="operador@astrolink.space"/>
        </div>
 
        <div class="mb-3">
          <label class="form-label">Senha</label>
          <input type="password" id="senha" class="form-control" placeholder="Senha"/>
        </div>
 
        <button class="btn btn-primary w-100" onclick="fazerLogin()">Entrar</button>
 
        <p class="text-muted text-center mt-3 small">
          Demo: operador@astrolink.space / 1234
        </p>
      </div>
    </div>
  </div>
</div>
 
<!-- DASHBOARD -->
<div id="paginaDashboard" class="container mt-4" style="display:none;">
 
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4>🛸 AstroLink — Nave Orion-03</h4>
    <button class="btn btn-outline-secondary btn-sm" onclick="sair()">Sair</button>
  </div>
 
  <!-- Métricas -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card p-3 text-center shadow-sm">
        <p class="text-muted mb-1 small">Oxigênio</p>
        <h4 id="oxigenio">—</h4>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card p-3 text-center shadow-sm">
        <p class="text-muted mb-1 small">Temperatura</p>
        <h4 id="temperatura">—</h4>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card p-3 text-center shadow-sm">
        <p class="text-muted mb-1 small">Pressão</p>
        <h4 id="pressao">—</h4>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card p-3 text-center shadow-sm">
        <p class="text-muted mb-1 small">Velocidade</p>
        <h4 id="velocidade">—</h4>
      </div>
    </div>
  </div>
 
  <!-- Alertas -->
  <div class="card p-3 shadow-sm">
    <h6 class="mb-3">Alertas</h6>
    <ul id="listaAlertas" class="list-group list-group-flush">
      <li class="list-group-item text-muted small">Nenhum alerta ainda.</li>
    </ul>
  </div>
 
</div>
 
<script>
  // Login
  function fazerLogin() {
    var email = document.getElementById('email').value;
    var senha = document.getElementById('senha').value;
 
    if (email === 'operador@astrolink.space' && senha === '1234') {
      document.getElementById('paginaLogin').style.display = 'none';
      document.getElementById('paginaDashboard').style.display = 'block';
      iniciarMonitoramento();
    } else {
      document.getElementById('erroLogin').classList.remove('d-none');
    }
  }
 
  // Sair
  function sair() {
    document.getElementById('paginaDashboard').style.display = 'none';
    document.getElementById('paginaLogin').style.display = 'block';
  }
 
  // Atualiza os dados a cada 3 segundos
  function iniciarMonitoramento() {
    atualizarDados();
    setInterval(atualizarDados, 3000);
  }
 
  function atualizarDados() {
    // Gera valores aleatórios
    var ox   = (Math.random() * (23 - 18) + 18).toFixed(1);
    var temp = (Math.random() * (27 - 18) + 18).toFixed(1);
    var pres = (Math.random() * (1.1 - 0.95) + 0.95).toFixed(2);
    var vel  = Math.floor(Math.random() * (28000 - 27000) + 27000);
 
    // Mostra os valores
    document.getElementById('oxigenio').textContent   = ox + '%';
    document.getElementById('temperatura').textContent = temp + '°C';
    document.getElementById('pressao').textContent     = pres + ' atm';
    document.getElementById('velocidade').textContent  = vel + ' km/h';
 
    // Alerta se oxigênio baixo
    if (ox < 19.5) {
      adicionarAlerta('Oxigênio baixo: ' + ox + '%', 'danger');
    }
 
    // Alerta se temperatura alta
    if (temp > 25) {
      adicionarAlerta('Temperatura alta: ' + temp + '°C', 'warning');
    }
  }
 
  function adicionarAlerta(mensagem, tipo) {
    var lista = document.getElementById('listaAlertas');
 
    // Remove o texto padrão se for o primeiro alerta
    if (lista.children[0].classList.contains('text-muted')) {
      lista.innerHTML = '';
    }
 
    var item = document.createElement('li');
    item.className = 'list-group-item list-group-item-' + tipo + ' small';
    item.textContent = new Date().toLocaleTimeString('pt-BR') + ' — ' + mensagem;
    lista.prepend(item);
  }
</script>
 
</body>
</html>
